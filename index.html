<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Suporte - PoC Integração ITSM</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, textarea, button { width: 100%; margin-bottom: 10px; padding: 10px; }
        button { background-color: #007BFF; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #status { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>Abertura de Chamado (PoC Integração API)</h2>
    <p>Preencha os dados para injetar o ticket no Halo ITSM:</p>

    <input type="text" id="tituloChamado" placeholder="Resumo (Ex: Sistema inoperante)">
    <textarea id="descricaoChamado" rows="4" placeholder="Descreva os detalhes do incidente..."></textarea>
    <button onclick="enviarChamado()">Injetar no Halo ITSM</button>
    
    <p id="statusMensagem"></p>

    <script>
    async function enviarChamado() {
        document.getElementById("statusMensagem").innerText = "Estabelecendo conexão e negociando token...";
        document.getElementById("statusMensagem").style.color = "blue";
        
        // ========================================================
        // INSIRA SUAS CREDENCIAIS AQUI:
        const tenantUrl = "https://hugoriballe.haloitsm.com/"; 
        const clientId = "84b1f905-1e86-4897-a4a6-059787863c2b";
        const clientSecret = "pcYMM7x6eOCvr9JfBz8Qt6uV4nSsIoL9mPu0FURMdog";
        // ========================================================

        try {
            // 1. Solicitando o Token de Acesso (OAuth2)
            const tokenResponse = await fetch(`${tenantUrl}/auth/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    'grant_type': 'client_credentials',
                    'client_id': clientId,
                    'client_secret': clientSecret
                })
            });
            
            if (!tokenResponse.ok) throw new Error("Falha ao obter Token de Autorização.");
            
            const tokenData = await tokenResponse.json();
            const accessToken = tokenData.access_token;

            // 2. Montando o Payload do Chamado (JSON)
            const titulo = document.getElementById("tituloChamado").value;
            const descricao = document.getElementById("descricaoChamado").value;

            const ticketPayload = {
                "summary": titulo,
                "details": descricao,
                "tickettype_id": 1 // ID padrão para Incidentes
            };

            // 3. Disparando os dados para a API
            document.getElementById("statusMensagem").innerText = "Token recebido. Criando chamado...";
            
            const ticketResponse = await fetch(`${tenantUrl}/api/Tickets`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify([ticketPayload])
            });

            if(ticketResponse.ok) {
                document.getElementById("statusMensagem").innerText = "Sucesso Absoluto! Chamado criado no painel do Halo.";
                document.getElementById("statusMensagem").style.color = "green";
            } else {
                throw new Error("API recusou o payload do ticket.");
            }

        } catch (error) {
            console.error("Erro na operação:", error);
            document.getElementById("statusMensagem").innerText = "Operação bloqueada. Verifique o Console (F12) para análise técnica.";
            document.getElementById("statusMensagem").style.color = "red";
        }
    }
    </script>
</body>
</html>
